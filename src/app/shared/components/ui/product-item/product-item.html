<style>
  /* product-card.component.css */

  /* ── Fonts ── */

  /* ── Green palette derived from #0aad0a ──
   #f2faf2  →  cream    (lightest tint, card bg)
   #e4f5e4  →  warm     (image section bg)
   #6bac6b  →  muted    (secondary text, empty stars)
   #0aad0a  →  primary  (CTA bg, discount pill, fav fill)
   #087808  →  deep     (headings, dark text, badge)
   #3d8f3d  →  mid      (filled stars)
*/

  :host {
    display: block;

    --clr-cream: #f2faf2;
    --clr-warm: #e4f5e4;
    --clr-muted: #6bac6b;
    --clr-primary: #0aad0a;
    --clr-deep: #054a05;
    --clr-star: #3d8f3d;
  }

  /* ── Serif display font for title & price ── */
  .product-title,
  .current-price {
  }

  /* ── Star color states ── */
  .star--filled,
  .star--half {
    color: var(--clr-star);
  }

  /* ── Heart button — active (fav) state ── */
  .heart-btn--active {
    background-color: #d4f5d4 !important;
  }

  /* ── Heart icon — filled state ── */
  .heart-icon--filled {
    fill: var(--clr-primary) !important;
    stroke: var(--clr-primary) !important;
  }
</style>

<article
  class="group relative w-80  overflow-hidden rounded-[20px] bg-[#f2faf2] shadow-[0_2px_12px_rgba(5,74,5,0.08),0_1px_3px_rgba(5,74,5,0.06)] transition-all duration-350 ease-out hover:-translate-y-1 hover:shadow-[0_16px_48px_rgba(5,74,5,0.16),0_4px_12px_rgba(5,74,5,0.10)]"
>
  <!-- ── Image Section ── -->
  <div class="relative overflow-hidden h-80 bg-[#e4f5e4]">
    <img
      [src]="product().imageCover"
      [alt]="product().title"
      class="h-full w-full object-cover transition-transform duration-550ms ease-[cubic-bezier(0.25,0.46,0.45,0.94)] group-hover:scale-[1.06]"
    />

    <!-- Gradient overlay on hover -->
    <div
      class="absolute inset-0 bg-linear-to-t from-[rgba(5,74,5,0.18)] to-transparent opacity-0 transition-opacity duration-350 group-hover:opacity-100"
    ></div>

    <!-- Discount pill -->
    <span
      class="absolute bottom-3.5 left-3.5 rounded-full bg-main px-2.5 py-1 text-[11px] font-semibold text-white"
    >
      -{{ discountPercent() }}%
    </span>

    <!-- Heart / Favourite button -->
    <button
      class="heart-btn absolute right-3.5 top-3.5 flex h-9.5 w-9.5 cursor-pointer items-center justify-center rounded-full border-0 bg-[rgba(242,250,242,0.88)] backdrop-blur-sm transition-all duration-200 hover:scale-110 hover:bg-slate-200"
      [class.heart-btn--active]="isFav()"
      (click)="toggleFav()"
      aria-label="Add to favourites"
    >
      <svg
        viewBox="0 0 24 24"
        class="heart-icon h-4.5 w-4.5 stroke-[#6bac6b] stroke:1.8 [stroke-linecap:round] [stroke-linejoin:round] transition-all duration-200"
        [class.heart-icon--filled]="isFav()"
        fill="none"
      >
        <path
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5
             0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5
             5.5 0 0 0 0-7.78z"
        />
      </svg>
    </button>
  </div>
  <!-- /Image Section -->

  <!-- ── Card Body ── -->
  <div class="flex flex-col gap-2.5 px-5.5 py-5 pb-5.5">
    <!-- Title -->
    <h2 class="product-title m-0 text-[19px] font-medium leading-tight text-[#054a05]">
      {{ product().category.name }}
    </h2>

    <!-- Description -->
    <p class="m-0 line-clamp-2 text-[13px] leading-[1.6] text-[#6bac6b]">
      {{ product().title.slice(0, 35) }}...
    </p>

    <!-- Pricing -->
    <div class="flex justify-between">
      <div class="flex items-baseline gap-2.5">
        <span class="current-price text-[22px] font-semibold text-[#054a05]">
          ${{ product().price.toFixed(2) }}
        </span>
        <span class="text-sm text-[#6bac6b] line-through"> ${{ product().price.toFixed(2) }} </span>
      </div>

      <!-- Stars + Review count -->
      <div class="flex items-center gap-1.5">
        <div
          class="flex gap-0.5"
          [attr.aria-label]="'Rating: ' + product().ratingsAverage + ' out of 5'"
        >
          @for (star of stars(); track $index) {
            <svg
              viewBox="0 0 20 20"
              class="star h-3.75 w-3.75 text-[#c4dcc4]"
              [class.star--filled]="star === 'full'"
              [class.star--half]="star === 'half'"
            >
              <defs>
                <linearGradient [id]="'half-' + $index">
                  <stop offset="50%" stop-color="currentColor" />
                  <stop offset="50%" stop-color="transparent" />
                </linearGradient>
              </defs>
              <polygon
                points="10,1 12.9,7 19.5,7.6 14.5,12 16.2,18.5 10,15 3.8,18.5 5.5,12 0.5,7.6 7.1,7"
                [attr.fill]="star === 'half' ? 'url(#half-' + $index + ')' : 'currentColor'"
                stroke="currentColor"
                stroke-width="0.5"
              />
            </svg>
          }
        </div>
        <span class="text-[12px] font-normal text-[#6bac6b]">
          ({{ product().ratingsQuantity }})
        </span>
      </div>
    </div>

    <!-- Add to Cart CTA -->
    <button
      class="mt-1 flex w-full cursor-pointer items-center justify-center gap-2 rounded-[12px] border-0 bg-main px-4 py-3.25 text-[13px] font-medium tracking-[0.06em] text-[#f2faf2] transition-all duration-200 hover:scale-[1.015] hover:bg-[#178c17] active:scale-[0.98]"
    >
      <i class="fa-solid fa-cart-plus"></i>
      Add to Cart
    </button>
  </div>
  <!-- /Card Body -->
</article>
